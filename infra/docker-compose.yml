version: '3.9'

services:
  api-gateway:
    build:
      context: ..
      dockerfile: services/api-gateway/Dockerfile
    env_file:
      - ./env/api-gateway.env
    ports:
      - "8000:8000"
    depends_on:
      - simulation-service
      - data-processing-service
      - analysis-service
      - worker

  simulation-service:
    build:
      context: ..
      dockerfile: services/simulation-service/Dockerfile
    env_file:
      - ./env/simulation-service.env
    ports:
      - "8001:8001"

  data-processing-service:
    build:
      context: ..
      dockerfile: services/data-processing-service/Dockerfile
    env_file:
      - ./env/data-processing-service.env
    ports:
      - "8002:8002"

  analysis-service:
    build:
      context: ..
      dockerfile: services/analysis-service/Dockerfile
    env_file:
      - ./env/analysis-service.env
    ports:
      - "8004:8004"

  worker:
    build:
      context: ..
      dockerfile: services/worker/Dockerfile
    env_file:
      - ./env/worker.env
    ports:
      - "8003:8003"
